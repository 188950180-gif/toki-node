# Toki 普通节点配置文件
# 用于连接到已有的种子节点

[node]
data_dir = "./data"
log_level = "info"

[network]
# 监听本地网络接口
listen_addr = "/ip4/0.0.0.0/tcp/30334"
# 连接种子节点（替换为实际的种子节点地址）
# 格式: /ip4/<IP地址>/tcp/<端口>/p2p/<节点ID>
bootstrap_peers = [
    # 示例：替换为您的种子节点地址
    # "/ip4/182.254.176.30/tcp/30333/p2p/12D3KooWExampleNodeId123456789..."
]
# 启用 DHT 节点发现
enable_dht = true
# 启用 UPnP
enable_upnp = true
# 最大连接数
max_connections = 50
# 连接超时（秒）
connection_timeout = 30

[consensus]
# 启用挖矿
enable_mining = true
# 矿工地址（替换为您的地址）
miner_address = ""
# 目标出块时间（秒）
target_block_time = 10
# 难度调整周期（区块数）
difficulty_adjustment_interval = 100

[api]
# REST API 监听地址（仅本地访问）
listen_addr = "127.0.0.1:8080"
# 启用 WebSocket
enable_ws = true

[mining]
# 挖矿线程数（0 = 自动检测 CPU 核心数）
thread_count = 0
# 是否启用 GPU 挖矿（默认 false，使用 CPU）
enable_gpu = false
# 最大功耗限制（瓦特，0 = 无限制）
max_power_watts = 0
# 挖矿优先级（0-10，默认 5）
priority = 5
