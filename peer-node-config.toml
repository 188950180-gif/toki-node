# Toki 普通节点配置
# 连接到种子节点: 182.254.176.30
# 系统: Ubuntu Server 24.04 LTS 64bit

data_dir = "/opt/toki/data"
backup_path = "/opt/toki/backups"
log_level = "info"

[network]
# 监听所有接口
listen_addr = "/ip4/0.0.0.0/tcp/30333"
# 种子节点地址（连接到公网种子节点）
# 注意: 需要替换 <PEER_ID> 为种子节点的实际 PeerId
# 获取方式: 启动种子节点后，查看日志中的 "本地节点 ID: ..."
bootstrap_peers = [
    "/ip4/182.254.176.30/tcp/30333/p2p/<PEER_ID>"
]
# 最大连接数
max_connections = 100
# 启用 UPnP
enable_upnp = false

[consensus]
# 启用挖矿
enable_mining = true
miner_address = ""
target_block_time = 10

[api]
# API 监听
listen_addr = "0.0.0.0:8080"
enable_ws = true
